<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gambling machine</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

body{
    margin:0;
    color:white;
    font-family:Arial,sans-serif;

    background-image:url("Assets/background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

img{
    margin-top:20px;

    max-width:100%;

    max-height:400px;

    object-fit:contain;

    border-radius:16px;

    box-shadow:0 8px 25px rgba(0,0,0,.45);
}

 .fade{
    animation:fade .35s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
    
.card{
    width:700px;
    max-width:90%;

    text-align:center;

    padding:35px;

    border-radius:20px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

img{
    max-width:100%;
    border-radius:12px;
    margin-top:20px;
}

button{
    margin-top:25px;

    background:#4e7fff;
    color:white;

    border:none;

    padding:15px 28px;

    border-radius:12px;

    font-size:20px;

    cursor:pointer;

    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

button:active{
    transform:scale(.96);
}
</style>

</head>
<body>

<div class="card">
    <h1 id="text">loading...</h1>
    <img id="image">
    <br>
    <button onclick="roll()">gamble again</button>
</div>

<script src="script.js"></script>

</body>
</html>
